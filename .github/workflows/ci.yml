name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: >
          uv run
          --with pytest
          --with pytest-asyncio
          --with mcp
          --with ollama
          pytest test_mcp_fs_agent.py -v
